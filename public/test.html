<!DOCTYPE html>
<html>
<head>
<style>
body { background: #0a0a0a; }
.social-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: inline-block;
  margin: 10px;
  background-image: url('social-icons.png');
  background-size: auto 150px;
  background-repeat: no-repeat;
}
.fb { background-position: -2.5px center; }
.ig { background-position: -47.5px center; }
.yt { background-position: -92.5px center; }
.tk { background-position: -137.5px center; }
.x { background-position: -182.5px center; }
</style>
</head>
<body>
<div class="social-icon fb"></div>
<div class="social-icon ig"></div>
<div class="social-icon yt"></div>
<div class="social-icon tk"></div>
<div class="social-icon x"></div>
</body>
</html>
